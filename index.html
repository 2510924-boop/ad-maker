<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AD Maker - AI 마케팅 스튜디오</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        #result {
            display: none;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 999px;
            font-size: 0.875rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚀 Smart AD Maker</h1>
        <p>AI가 당신의 브랜드를 위한 완벽한 마케팅 전략을 세우는데 도움을 줍니다.</p>
    </header>

    <div class="card">
        <div class="input-group">
            <label>Groq API KEY</label>
            <input type="password" id="apiKey" placeholder="gsk_..." />
        </div>
        
        <div class="input-group">
            <label>제품/서비스 명</label>
            <input type="text" id="product" placeholder="예: 마카롱, 친환경 텀블러">
        </div>

        <div class="input-group">
            <label>타겟 연령층</label>
            <select id="target">
                <option value="10대">10대</option>
                <option value="2030 사회초년생">2030 사회초년생</option>
                <option value="4050 부모님">4050 부모님</option>
                <option value="전연령">전연령</option>
            </select>
        </div>

        <div class="input-group">
            <label>브랜드 분위기</label>
            <select id="mood">
                <option value="감성적인">감성적인</option>
                <option value="고급스러운">고급스러운</option>
                <option value="재치있는(밈 스타일)">재치있는 (밈 스타일)</option>
                <option value="신뢰감 있는">신뢰감 있는</option>
            </select>
        </div>

        <button onclick="generateAD()" id="submitBtn">광고 전략 생성하기</button>
    </div>

    <div class="loading" id="loader">
        AI 마케터가 전략을 분석 중입니다... 잠시만 기다려주세요.
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <div class="badge">AI 분석 결과</div>
        <div id="result"></div>
    </div>
</div>

<script>
async function generateAD() {
    const apiKey = document.getElementById('apiKey').value;
    const product = document.getElementById('product').value;
    const target = document.getElementById('target').value;
    const mood = document.getElementById('mood').value;

    if (!apiKey || !product) {
        alert("API 키와 제품명을 입력해주세요!");
        return;
    }

    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('resultCard');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    loader.style.display = 'block';
    resultCard.style.display = 'none';
    submitBtn.disabled = true;

    const prompt = `
    당신은 전문 카피라이터이자 마케팅 전략가입니다. 
    다음 정보를 바탕으로 마케팅 콘텐츠를 작성하세요.

    1. 제품: ${product}
    2. 타겟: ${target}
    3. 분위기: ${mood}

    [출력 형식]
    ## 1. 광고 문구 (3가지 버전)
    - 버전 1: 
    - 버전 2: 
    - 버전 3: 

    ## 2. SNS 홍보글 (해시태그 포함)
    (이모지를 적절히 섞어서 본문 작성)

    ## 3. 마케팅 전략 분석
    - 소비자 타겟팅 포인트:
    - 예상 반응:

    ## 4. 추천 브랜드 컬러
    - 메인 컬러: (이유와 함께 HEX코드 추천)
    `;

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                messages: [
                    { role: "system", content: "당신은 한국어 마케팅 전문가입니다. 모든 답변은 한국어로 정중하고 전문적으로 작성하세요." },
                    { role: "user", content: prompt }
                ],
                temperature: 0.7
            })
        });

        const data = await response.json();
        
        if (data.error) {
            throw new Error(data.error.message);
        }

        const aiResponse = data.choices[0].message.content;
        resultDiv.innerText = aiResponse;
        resultCard.style.display = 'block';
        resultDiv.style.display = 'block';

    } catch (error) {
        alert("에러가 발생했습니다: " + error.message);
    } finally {
        loader.style.display = 'none';
        submitBtn.disabled = false;
    }
}
</script>

</body>
</html>
